# A generic, single database configuration for Alembic.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; The default combo is below.
# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
# file_template = %%(rev)s_%%(slug)s

# sys.path path, required for autodiscovery of models
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to truncate the migration character to
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported
# during generation of scripts; defaults to false.
# include_schemas = false

# set to 'true' to support standard input when running
# in 'offline' mode
# output_buffer = 80

# version locations.  Multiple locations may be
# specified, separated by delimiters.
# version_locations = %(here)s/bar

# logging configuration is managed below.
sqlalchemy.url = sqlite:///./sql_app.db


[post_write_hooks]
# post_write_hooks defines scripts or methods that are run after a revision is created.
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILE

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
